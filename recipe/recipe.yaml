schema_version: 1

context:
  name: dtool_gui_tk
  version: 0.4.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/dtool-gui-tk/dtool-gui-tk-${{ version }}.tar.gz
  sha256: eb423a9e74d671583a8da1bdb08338a2906a1c6187daca7b2c7ad133bebb47df

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - dtool-tk=dtool_gui_tk.tkgui:tkgui

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - dtool_info
    - dtoolcore >=3.18.0
    - jsonschema
    - python >=${{ python_min }}
    - ruamel.yaml

tests:
  - python:
      imports:
        - dtool_gui_tk
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Graphical user interface for managing data using dtool
  license: MIT
  license_file: LICENSE.rst
  homepage: https://github.com/jic-dtool/dtool-gui-tk

extra:
  recipe-maintainers:
    - jan-janssen
